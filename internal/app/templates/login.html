<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - iCloud Privacy Mail</title>
  <style>
    :root { --bg:#eef8f6; --panel:#fff; --line:rgba(118,143,174,.25); --text:#061637; --muted:#4e6483; --green:#13b8a6; --red:#dc2626; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter,ui-sans-serif,system-ui,"Segoe UI",sans-serif; color:var(--text); background:radial-gradient(circle at 12% 10%,rgba(19,184,166,.18),transparent 30%),linear-gradient(180deg,#f8fbff,#eef8f6); }
    .wrap { width:min(980px, calc(100% - 32px)); display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:stretch; }
    .hero, .card { border:1px solid var(--line); border-radius:24px; background:rgba(255,255,255,.9); box-shadow:0 28px 90px rgba(17,70,101,.12); }
    .hero { padding:36px; display:flex; flex-direction:column; justify-content:center; }
    .eyebrow { color:#059b87; font-size:12px; font-weight:900; letter-spacing:.16em; text-transform:uppercase; }
    h1 { margin:10px 0 12px; font-size:36px; letter-spacing:-.04em; }
    p { color:var(--muted); line-height:1.7; margin:0; }
    .card { padding:22px; }
    .tabs { display:flex; gap:10px; margin-bottom:16px; }
    button { border:1px solid var(--line); border-radius:12px; background:#fff; color:var(--text); padding:11px 14px; cursor:pointer; font-weight:800; }
    button.active, button.primary { border-color:transparent; background:linear-gradient(135deg,#13b8a6,#17c9ae); color:#fff; }
    label { display:flex; flex-direction:column; gap:7px; color:var(--muted); font-size:12px; font-weight:800; margin:12px 0; }
    input { border:1px solid var(--line); border-radius:12px; padding:12px; outline:none; font:inherit; }
    input:focus { border-color:rgba(19,184,166,.62); box-shadow:0 0 0 4px rgba(19,184,166,.12); }
    .actions { display:flex; gap:10px; align-items:center; margin-top:16px; }
    .notice { margin-top:14px; padding:12px; border-radius:14px; background:#ecfdf5; color:#0f766e; white-space:pre-wrap; line-height:1.6; }
    .notice[hidden] { display:none; }
    .notice.err { background:#fff5f5; color:#b91c1c; }
    @media (max-width:820px){ .wrap{grid-template-columns:1fr;} h1{font-size:30px;} }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">Account Login</div>
      <h1>iCloud Privacy Mail</h1>
      <p>登录后管理 iCloud 隐私邮箱和验证码 API。</p>
    </section>
    <section class="card">
      <div class="tabs">
        <button id="loginTab" class="active" onclick="switchMode('login')">登录</button>
        <button id="registerTab" onclick="switchMode('register')">注册</button>
      </div>
      <label>账号<input id="username" autocomplete="username" placeholder="例如 admin 或 user@example.com"></label>
      <label>密码<input id="password" type="password" autocomplete="current-password" placeholder="至少 6 位"></label>
      <div class="actions">
        <button class="primary" id="submitButton" onclick="submitAuth()">登录</button>
      </div>
      <div class="notice" id="notice" hidden></div>
    </section>
  </main>
  <script>
    let mode = 'login';
    const $ = id => document.getElementById(id);
    function switchMode(next) {
      mode = next;
      $('loginTab').classList.toggle('active', mode === 'login');
      $('registerTab').classList.toggle('active', mode === 'register');
      $('submitButton').textContent = mode === 'login' ? '登录' : '注册并登录';
      clearNotice();
    }
    function setNotice(text, isErr=false) {
      $('notice').textContent = text;
      $('notice').classList.toggle('err', isErr);
      $('notice').hidden = !text;
    }
    function clearNotice() {
      setNotice('');
    }
    async function submitAuth() {
      const username = $('username').value.trim();
      const password = $('password').value;
      if (!username || !password) {
        setNotice('账号和密码不能为空', true);
        return;
      }
      $('submitButton').disabled = true;
      try {
        const res = await fetch(mode === 'login' ? '/api/auth/login' : '/api/auth/register', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {'content-type':'application/json'},
          body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || data.code || `HTTP ${res.status}`);
        setNotice(`${mode === 'login' ? '登录' : '注册'}成功：${data.user.username}${data.user.is_admin ? ' / 管理员' : ''}`);
        location.href = '/';
      } catch (err) {
        setNotice(err.message, true);
      } finally {
        $('submitButton').disabled = false;
      }
    }
    fetch('/api/auth/me', {credentials:'same-origin'})
      .then(r => r.json())
      .then(data => { if (data.authenticated) location.href = '/'; })
      .catch(() => {});
  </script>
</body>
</html>
